services:
  # Backend API Node.js
  backend:
    build: ./backend
      context: .
      dockerfile: Dockerfile
    container_name: irrigacion_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      TZ: America/Argentina/Buenos_Aires
      
      # PostgreSQL
      DB_CLIENT: pg
      DB_HOST: ${DB_HOST:-db_central}
      DB_PORT: 5432
      DB_USER: ${DB_USER:-user_bot_irrigacion}
      DB_PASSWORD: ${DB_PASSWORD:-l3NDuJOTLs8YFy}
      DB_NAME: ${DB_NAME:-bot_irrigacion}
      DB_POOL_MIN: 5
      DB_POOL_MAX: 20
      
      # Meta/WhatsApp
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      WEBHOOK_VERIFY_TOKEN: ${WEBHOOK_VERIFY_TOKEN}
      
      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: 8h
      
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secret}
      
      # URLs
      BASE_URL: ${BASE_URL:-https://api-bot.irrigacionmalargue.net}
      API_URL: ${API_URL:-https://api-bot.irrigacionmalargue.net/api}
      WEBHOOK_URL: ${WEBHOOK_URL:-https://api-bot.irrigacionmalargue.net/webhook}
      FRONTEND_URL: ${FRONTEND_URL:-https://api-bot.irrigacionmalargue.net}
    volumes:
      - backend_temp:/app/temp
      - backend_uploads:/app/uploads
      - backend_tokens:/app/tokens
      - backend_logs:/app/logs
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - irrigacion_network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 40s

  # PostgreSQL 15-alpine
  db:
    image: postgres:15-alpine
    container_name: db_central
    hostname: db_central
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-user_bot_irrigacion}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-l3NDuJOTLs8YFy}
      POSTGRES_DB: ${DB_NAME:-bot_irrigacion}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - irrigacion_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-user_bot_irrigacion} -d ${DB_NAME:-bot_irrigacion}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7-alpine
  redis:
    image: redis:7-alpine
    container_name: irrigacion_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret} --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - irrigacion_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-redis_secret} ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  irrigacion_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_temp:
    driver: local
  backend_uploads:
    driver: local
  backend_tokens:
    driver: local
  backend_logs:
    driver: local
