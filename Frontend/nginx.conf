# ================================
# Nginx Config - Frontend + Reverse Proxy
# ================================

# Upstream para el backend (servicio Docker Compose)
upstream backend {
    server backend:3000;
}

server {
    listen 80;
    server_name chat.irrigacionmalargue.net;

    # Directorio raíz para archivos estáticos
    root /usr/share/nginx/html;
    index index.html;

    # Configuración de logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ================================
    # Compresión Gzip
    # ================================
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/x-javascript application/xml+rss 
               application/javascript application/json 
               application/xml image/svg+xml;

    # ================================
    # Reverse Proxy para Backend API
    # Location: /api/*
    # ================================
    location /api/ {
        proxy_pass http://backend;
        
        # Headers básicos de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Headers para WebSockets (Socket.io)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts para conexiones largas
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Desactivar buffering para WebSockets
        proxy_buffering off;
    }

    # ================================
    # Reverse Proxy para Webhooks Meta
    # Location: /webhook
    # ================================
    location /webhook {
        proxy_pass http://backend;
        
        # Headers básicos de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ================================
    # Reverse Proxy para Socket.io
    # Location: /socket.io/*
    # ================================
    location /socket.io/ {
        proxy_pass http://backend;
        
        # Headers básicos de proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Headers para WebSockets
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts para conexiones largas
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Desactivar buffering
        proxy_buffering off;
    }

    # ================================
    # Frontend React (SPA)
    # Location: / (Fallback para todas las rutas)
    # ================================
    location / {
        # Try files sirve archivos estáticos primero
        # Si no existe, sirve index.html (React Router)
        try_files $uri $uri/ /index.html;
        
        # Cache control para HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # ================================
    # Archivos estáticos con cache
    # ================================
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ================================
    # Manejo de errores
    # ================================
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
