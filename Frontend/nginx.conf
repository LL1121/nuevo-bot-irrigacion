server {
    listen 80;
    listen [::]:80;
    server_name whatsapp.irrigacionmalargue.net;

    root /usr/share/nginx/html;
    index index.html;

    # Healthcheck para container/orquestador
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # Seguridad básica
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # No cachear HTML para no servir shell vieja
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate" always;
    }

    # Cache largo para assets hasheados
    location ~* \.(?:js|mjs|css|png|jpg|jpeg|gif|webp|ico|svg|woff2?|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
